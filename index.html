<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Szybki Generator QR (2GB+)</title>
    <style>
        :root { --primary: #2563eb; --background: #f1f5f9; --card: #ffffff; --text: #0f172a; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; background: var(--background); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h1 { font-size: 22px; margin-bottom: 10px; }
        p { font-size: 14px; color: #64748b; margin-bottom: 20px; }
        .file-box { border: 2px dashed #cbd5e1; padding: 35px; border-radius: 12px; cursor: pointer; margin-bottom: 20px; background: #fafafa; }
        #fileInput { display: none; }
        .file-name { font-size: 14px; color: var(--primary); font-weight: bold; margin-top: 10px; display: none; word-break: break-all; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 16px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #cbd5e1; }
        .progress-container { display: none; margin: 15px auto; width: 100%; }
        .progress-bar { width: 100%; background-color: #e2e8f0; border-radius: 8px; overflow: hidden; height: 12px; }
        .progress-fill { width: 0%; height: 100%; background-color: var(--primary); }
        .progress-text { font-size: 12px; color: #64748b; margin-top: 5px; font-weight: bold; }
        #result { margin-top: 20px; display: none; border-top: 1px solid #e2e8f0; padding-top: 20px; }
        #qrCanvas { margin-top: 15px; background: white; padding: 8px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 250px; height: 250px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Szybki Generator QR</h1>
    <p>Wybierz plik do 2GB. Kod QR wygeneruje się bezpośrednio z bezpiecznego połączenia.</p>
    
    <div class="file-box" onclick="document.getElementById('fileInput').click()">
        <span style="font-size: 40px;">📁</span>
        <div style="font-size: 14px; color: #64748b; margin-top: 5px;">KLIKNIJ I WYBIERZ PLIK</div>
        <div id="fileName" class="file-name"></div>
    </div>
    
    <input type="file" id="fileInput" onchange="pokazPlik(this)">
    <button id="btn" onclick="wyslijPlik()" disabled>Generuj Kod QR</button>
    
    <div class="progress-container" id="progressContainer">
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-text" id="progressText">Wysyłanie: 0%</div>
    </div>
    
    <div id="result">
        <div style="font-size: 14px; font-weight: bold; color: #16a34a;">Gotowe! Zeskanuj teraz:</div>
        <canvas id="qrCanvas"></canvas>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/qrious@4.0.2/dist/qrious.min.js"></script>

<script>
    let plik = null;

    function pokazPlik(input) {
        const nameDiv = document.getElementById('fileName');
        const btn = document.getElementById('btn');
        if (input.files.length > 0) {
            plik = input.files[0];
            const rozmiarMB = (plik.size / (1024 * 1024)).toFixed(1);
            nameDiv.innerText = `${plik.name} (${rozmiarMB} MB)`;
            nameDiv.style.display = "block";
            btn.disabled = false;
        }
    }

    function wyslijPlik() {
        if (!plik) return;
        
        const btn = document.getElementById('btn');
        const result = document.getElementById('result');
        const progressContainer = document.getElementById('progressContainer');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');
        const canvas = document.getElementById('qrCanvas');
        
        btn.disabled = true;
        result.style.display = "none";
        progressContainer.style.display = "block";

        const formData = new FormData();
        formData.append('file', plik);

        const xhr = new XMLHttpRequest();
        
        xhr.upload.addEventListener('progress', function(e) {
            if (e.lengthComputable) {
                const procent = Math.round((e.loaded / e.total) * 100);
                progressFill.style.width = procent + '%';
                progressText.innerText = `Wysyłanie: ${procent}% (${(e.loaded / (1024*1024)).toFixed(0)} / ${(e.total / (1024*1024)).toFixed(0)} MB)`;
            }
        });

        xhr.addEventListener('load', function() {
            progressContainer.style.display = "none";
            btn.disabled = false;

            if (xhr.status === 200) {
                try {
                    const data = JSON.parse(xhr.responseText);
                    if (data.success && data.link) {
                        const context = canvas.getContext('2d');
                        context.clearRect(0, 0, canvas.width, canvas.height);

                        // Generowanie kodu QR
                        new QRious({
                            element: canvas,
                            value: data.link,
                            size: 250,
                            level: 'H'
                        });
                        
                        result.style.display = "block";
                    } else {
                        alert("Błąd serwera: brak linku zwrotnego.");
                    }
                } catch(e) {
                    alert("Wystąpił błąd przy przetwarzaniu pliku.");
                }
            } else {
                alert("Połączenie odrzucone. Plik może być za duży lub serwer jest przeciążony.");
            }
        });

        xhr.addEventListener('error', function() {
            progressContainer.style.display = "none";
            btn.disabled = false;
            alert("Wysyłanie przerwane. Spróbuj użyć innego połączenia sieciowego.");
        });

        // Bezpośrednie wysyłanie na oficjalne API file.io z obsługą HTTPS i brakiem blokad CORS
        xhr.open('POST', 'https://file.io/');
        xhr.send(formData);
    }
</script>

</body>
</html>
